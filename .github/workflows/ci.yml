# CI for PyMan.
#
# Builds the single `pyman.exe` binary on Windows. Two jobs:
#   - build:   runs on every push/PR/tag — compiles the release binary, runs
#              the headless self-test to validate the spawn→stream→exit
#              pipeline, and uploads `pyman.exe` as a workflow artifact.
#              Catches regressions early.
#   - release: runs ONLY on tags (v*) — builds the same binary and attaches
#              it to a GitHub Release. Gated on the build job.
#
# Why Windows-only: the app targets Windows — build.rs sets the GUI subsystem
# for it, font.rs looks up msyh.ttc / SimHei in %WINDIR%\Fonts, and supervisor
# uses CREATE_NO_WINDOW. The cross-platform cfg guards let it compile on other
# OSes, but the runtime experience is Windows-tuned, so CI focuses there.
#
# Single self-contained exe: the GUI spawns the real `python` interpreter as a
# child process per script and embeds no CPython itself, so there is no second
# binary to ship — the release bundle is just `pyman.exe`.

name: build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch: # Allow manual runs from the Actions tab.

permissions:
  contents: write # release job needs this to upload assets via softprops/action-gh-release.

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      # No setup-python needed to BUILD: the GUI spawns the real `python` as a
      # child process and links no pyo3, so the build is fully self-contained
      # and needs no Python toolchain. Python IS needed to RUN the self-test
      # below (it spawns python.exe to run a real .py), so we set it up before
      # that step.
      - name: Show toolchain versions
        run: |
          cargo --version
          rustc --version

      - name: Build (release)
        # `cargo build` compiles the single `pyman` crate. There is no worker
        # binary to build or embed anymore — the GUI spawns python.exe at run
        # time. Result: one self-contained pyman.exe.
        run: cargo build --release --locked

      - name: Set up Python (for self-test)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run self-test
        # Headless end-to-end check: spawn python.exe, run examples/hello.py,
        # and assert the captured log matches. Exits non-zero on failure,
        # failing the build.
        run: ./target/release/pyman.exe --self-test

      - name: Upload pyman.exe (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: pyman-windows-${{ github.sha }}
          path: target/release/pyman.exe
          if-no-files-found: error

  # Release only on version tags (v*). Skips for plain branch pushes / PRs.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked

      - name: Get tag name
        id: tag
        shell: bash
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload pyman.exe
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/pyman.exe
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true # Auto-generate from commits since last tag.
          fail_on_unmatched_files: true
